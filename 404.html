<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Village Rising</title>
    <script type="text/javascript">
      // This script takes a "real" path and turns it into a Hash path
      // Example: /involved -> /#/involved
      var path = window.location.pathname;
      var search = window.location.search;
      var hash = window.location.hash;

      // Redirect to the root with the path as a hash
      window.location.replace(window.location.origin + '/#' + path + search + hash);
    </script>
  </head>
  <body>
    Redirecting...
  </body>
</html>
